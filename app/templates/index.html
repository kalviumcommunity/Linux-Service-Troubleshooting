<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{{ app_name }}</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 720px; margin: 2rem auto; line-height: 1.5; }
      code { background: #f3f3f3; padding: 0.15rem 0.3rem; border-radius: 3px; }
    </style>
  </head>
  <body>
    <h1>{{ app_name }}</h1>
    <p>CloudNotes is a simple note service for diagnosis practice.</p>

      <li><strong>GET /</strong> - this page</li>

      <li><strong>GET /notes</strong> - list saved notes</li>
    </ul>
    <p>Use <code>curl http://127.0.0.1:5000/health</code> to verify the service.</p>
  </body>
</html>
